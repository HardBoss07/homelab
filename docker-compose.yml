version: "3.8"

networks:
  traefik-network:
    external: true

services:
  # ==================== TRAEFIK ====================
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    ports:
      - "10080:80" # HTTP
      - "10443:443" # HTTPS
    environment:
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
      - CF_DNS_API_TOKEN=${CLOUDFLARE_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      # Note: No traefik.yml volume anymore!
    command:
      # --- Global Settings ---
      - "--log.level=DEBUG"
      - "--api.dashboard=true"
      - "--api.insecure=true" # (Optional) Allows accessing dashboard on port 8080 if mapped, or via router

      # --- Docker Provider ---
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"

      # --- Entrypoints (Replaces traefik.yml) ---
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"

      # --- Certificate Resolver (Cloudflare) ---
      # Docker WILL replace these variables correctly:
      - "--certificatesresolvers.cloudflare.acme.email=${CLOUDFLARE_EMAIL}"
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    networks:
      - traefik-network

  # ==================== WHOAMI ====================
  whoami:
    image: traefik/whoami:latest
    container_name: whoami
    restart: always
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.m4tt3o.dev`)" # 'whoami' subdomain
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls.certresolver=cloudflare"

  # ==================== STORABLE (App + API) ====================
  storable:
    image: m4tt3o/storable:latest
    env_file: .env
    container_name: storable_app
    restart: always
    depends_on:
      storable_db:
        condition: service_healthy
    networks:
      - traefik-network
    volumes:
      - /home/m4tt3o/enterprise-storable/storage:/app/storage
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      # This tells the frontend where to find the backend via the browser
      - NEXT_PUBLIC_API_URL=https://api-storable.m4tt3o.dev
    labels:
      - "traefik.enable=true"
      # Frontend Router
      - "traefik.http.routers.storable-fe.rule=Host(`storable.m4tt3o.dev`)"
      - "traefik.http.routers.storable-fe.entrypoints=websecure"
      - "traefik.http.routers.storable-fe.tls.certresolver=cloudflare"
      - "traefik.http.services.storable-fe.loadbalancer.server.port=3000"
      # Backend Router
      - "traefik.http.routers.storable-be.rule=Host(`api-storable.m4tt3o.dev`)"
      - "traefik.http.routers.storable-be.entrypoints=websecure"
      - "traefik.http.routers.storable-be.tls.certresolver=cloudflare"
      - "traefik.http.services.storable-be.loadbalancer.server.port=8080"

  # ==================== STORABLE DB ====================
  storable_db:
    image: mysql:8.0
    container_name: storable_db
    env_file: .env
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - storable_db_data:/var/lib/mysql
      - /home/m4tt3o/enterprise-storable/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - /home/m4tt3o/enterprise-storable/db/indexes.sql:/docker-entrypoint-initdb.d/002_indexes.sql
      - /home/m4tt3o/enterprise-storable/db/base-data.sql:/docker-entrypoint-initdb.d/003_base-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - traefik-network

  # ==================== PORTAINER ====================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.m4tt3o.dev`)" # 'portainer' subdomain
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=cloudflare"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  # ==================== CLOUDFLARED ====================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - traefik-network
    # Healthcheck added to automatically restart if tunnel stops responding
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "list"]
      interval: 1m
      retries: 3
      timeout: 10s
      start_period: 30s

volumes:
  letsencrypt:
  portainer_data:
