networks:
  traefik-network:
    external: true

services:
  # ==================== TRAEFIK ====================
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: always
    ports:
      - "10080:80"
      - "10443:443"
    environment:
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
      - CF_DNS_API_TOKEN=${CLOUDFLARE_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    command:
      - "--log.level=DEBUG"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.cloudflare.acme.email=${CLOUDFLARE_EMAIL}"
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    networks:
      - traefik-network

  # ==================== NEXTCLOUD ====================
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: always
    depends_on:
      - nextcloud_db
    networks:
      - traefik-network
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      - MYSQL_HOST=nextcloud_db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PWD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`cloud.m4tt3o.dev`)"
      - "traefik.http.routers.nextcloud.entrypoints=web,websecure"
      - "traefik.http.routers.nextcloud.tls.certresolver=cloudflare"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      - "traefik.http.middlewares.nextcloud-headers.headers.referrerPolicy=no-referrer"
      - "traefik.http.middlewares.nextcloud-headers.headers.stsSeconds=15552000"
      - "traefik.http.middlewares.nextcloud-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.nextcloud-headers.headers.stsPreload=true"
      - "traefik.http.routers.nextcloud.middlewares=nextcloud-headers"
      - "traefik.docker.network=traefik-network"

  nextcloud_db:
    image: mariadb:10.6
    container_name: nextcloud_db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    networks:
      - traefik-network
    volumes:
      - nextcloud_db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PWD}
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PWD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  # ==================== STORABLE (App + API) ====================
  storable:
    image: m4tt3o/storable:latest
    env_file: .env
    container_name: storable_app
    restart: always
    depends_on:
      storable_db:
        condition: service_healthy
    networks:
      - traefik-network
    volumes:
      - /home/m4tt3o/enterprise-storable/storage:/app/storage
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - SERVER_PORT=8080
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - NEXT_PUBLIC_API_URL=https://api-storable.m4tt3o.dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storable-fe.rule=Host(`storable.m4tt3o.dev`)"
      - "traefik.http.routers.storable-fe.entrypoints=websecure"
      - "traefik.http.routers.storable-fe.tls.certresolver=cloudflare"
      - "traefik.http.routers.storable-fe.service=storable-fe"
      - "traefik.http.services.storable-fe.loadbalancer.server.port=3000"
      - "traefik.http.routers.storable-be.rule=Host(`api-storable.m4tt3o.dev`)"
      - "traefik.http.routers.storable-be.entrypoints=websecure"
      - "traefik.http.routers.storable-be.service=storable-be"
      - "traefik.http.routers.storable-be.tls.certresolver=cloudflare"
      - "traefik.http.services.storable-be.loadbalancer.server.port=8080"

  # ==================== STORABLE DB ====================
  storable_db:
    image: mysql:8.0
    container_name: storable_db
    env_file: .env
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - storable_db_data:/var/lib/mysql
      - /home/m4tt3o/enterprise-storable/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - /home/m4tt3o/enterprise-storable/db/indexes.sql:/docker-entrypoint-initdb.d/002_indexes.sql
      - /home/m4tt3o/enterprise-storable/db/base-data.sql:/docker-entrypoint-initdb.d/003_base-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - traefik-network

  # ==================== PORTAINER ====================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.m4tt3o.dev`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=cloudflare"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  # ==================== CLOUDFLARED ====================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: always
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - traefik-network

# ==================== VOLUMES DEFINITION ====================
volumes:
  letsencrypt:
  portainer_data:
  storable_db_data:
  nextcloud_data:
  nextcloud_db_data: